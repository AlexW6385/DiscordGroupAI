version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: discord_bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    # Example: Start with specific roles. Overrides settings.enabled_roles in .env
    # command: python main.py --roles expert,warm
    command: python main.py
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"

  postgres:
    image: postgres:15-alpine
    container_name: bot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-discord_bot}
    ports:
      - "5432:5432"
    volumes:
      - bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-discord_bot}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bot_redis
    ports:
      - "6379:6379"
    volumes:
      - bot_redisdata:/data
    command: redis-server --appendonly yes

volumes:
  bot_pgdata:
  bot_redisdata:
